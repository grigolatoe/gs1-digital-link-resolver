name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -q

  lint:
    name: ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: pip install ruff==0.6.9

      - name: ruff check
        run: ruff check resolver tests

      - name: ruff format --check
        run: ruff format --check resolver tests

  docker:
    name: docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build image
        run: docker build -t gs1-resolver:ci .

      - name: Smoke-test container starts
        run: |
          docker run -d --name resolver-smoke -p 8080:8080 gs1-resolver:ci
          # Give uvicorn a moment to bind
          for i in $(seq 1 20); do
            if curl -sf http://localhost:8080/healthz >/dev/null; then
              echo "healthz OK"
              exit 0
            fi
            sleep 0.5
          done
          echo "healthz never became ready"
          docker logs resolver-smoke
          exit 1
        env:
          DOCKER_BUILDKIT: "1"

      - name: Cleanup
        if: always()
        run: docker rm -f resolver-smoke || true
